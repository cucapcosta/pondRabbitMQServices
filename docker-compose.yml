services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  back:
    build:
      context: ./src/back
      dockerfile: Dockerfile
    container_name: back
    ports:
      - "3420:3420"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672/

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sensors
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U admin -d sensors
      interval: 5s
      timeout: 3s
      retries: 5

  consumer:
    build:
      context: ./src/middleware
      dockerfile: Dockerfile
    container_name: consumer
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672/
      DATABASE_URL: postgres://admin:admin@postgres:5432/sensors?sslmode=disable

  loadtest:
    build:
      context: ./src/tests
      dockerfile: Dockerfile
    container_name: loadtest
    profiles:
      - loadtest
    depends_on:
      back:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      TARGET_URL: http://back:3420/add
      DATABASE_URL: postgres://admin:admin@postgres:5432/sensors?sslmode=disable
      DURATION: "30s"
      WORKERS: "10"

volumes:
  rabbitmq_data:
  postgres_data:
